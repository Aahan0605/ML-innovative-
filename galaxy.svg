<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 860" width="860" height="860">
<defs>
  <filter id="glow-g" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur stdDeviation="4" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glow-b" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur stdDeviation="4" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glow-sun" x="-150%" y="-150%" width="400%" height="400%">
    <feGaussianBlur stdDeviation="12" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <radialGradient id="sun-grad" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#ffffff"/>
    <stop offset="25%" stop-color="#aaffbb"/>
    <stop offset="60%" stop-color="#00ff41"/>
    <stop offset="100%" stop-color="#003010"/>
  </radialGradient>
  <radialGradient id="bg-grad" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#0d1f0d"/>
    <stop offset="100%" stop-color="#0d1117"/>
  </radialGradient>
</defs>
<style>
  .lbl { font-family: 'Courier New', Courier, monospace; font-size: 13px; text-anchor: middle; dominant-baseline: central; }
  .lg { fill: #00ff41; }
  .lb { fill: #00d4ff; }
  .ring { fill: none; stroke-width: 0.6; }
  .rg { stroke: #00ff41; opacity: 0.35; }
  .rb { stroke: #00d4ff; opacity: 0.35; }
  .pg { fill: #00ff41; }
  .pb { fill: #00d4ff; }

  /* === Orbit group rotations === */
  #o1 { transform-origin: 430px 430px; animation: spin 18s linear infinite; }
  #o2 { transform-origin: 430px 430px; animation: spin 30s linear infinite; }
  #o3 { transform-origin: 430px 430px; animation: spin 46s linear infinite; }
  #o4 { transform-origin: 430px 430px; animation: spin 63s linear infinite; }
  #o5 { transform-origin: 430px 430px; animation: spin 84s linear infinite; }
  #o6 { transform-origin: 430px 430px; animation: spin 108s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* === Planet counter-rotations (keep label upright) === */
  .c1 { transform-origin: 0px 0px; animation: c1s 18s linear infinite; }
  .c2 { transform-origin: 0px 0px; animation: c2s 30s linear infinite; }
  .c3 { transform-origin: 0px 0px; animation: c3s 46s linear infinite; }
  .c4 { transform-origin: 0px 0px; animation: c4s 63s linear infinite; }
  .c5 { transform-origin: 0px 0px; animation: c5s 84s linear infinite; }
  .c6 { transform-origin: 0px 0px; animation: c6s 108s linear infinite; }
  @keyframes c1s { to { transform: rotate(-360deg); } }
  @keyframes c2s { to { transform: rotate(-360deg); } }
  @keyframes c3s { to { transform: rotate(-360deg); } }
  @keyframes c4s { to { transform: rotate(-360deg); } }
  @keyframes c5s { to { transform: rotate(-360deg); } }
  @keyframes c6s { to { transform: rotate(-360deg); } }

  /* === Sun pulse === */
  #sun-halo { animation: pulse 2.5s ease-in-out infinite; transform-origin: 430px 430px; }
  #sun-halo2 { animation: pulse 2.5s ease-in-out infinite reverse; transform-origin: 430px 430px; }
  @keyframes pulse { 0%,100% { opacity: 0.15; transform: scale(1); } 50% { opacity: 0.35; transform: scale(1.18); } }

  /* stars twinkle */
  .tw { animation: twinkle 3s ease-in-out infinite; }
  .tw2 { animation: twinkle 5s ease-in-out infinite reverse; }
  @keyframes twinkle { 0%,100% { opacity: 0.9; } 50% { opacity: 0.2; } }
</style>

<!-- Background -->
<rect width="860" height="860" fill="url(#bg-grad)"/>

<!-- Stars -->
